<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detailed Result</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #fff8dc; }
        .result-box {
            background-color: #ffffff;
            border-left: 5px solid #17a2b8;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center mb-4">Detailed Prediction Steps</h2>

        <div class="result-box">
            <h4>Raw Input (First EEG Sample):</h4>
            <pre>{{ raw_input }}</pre>
        </div>

        <div class="result-box">
            <h4>Scaled Input:</h4>
            <pre>{{ scaled_input }}</pre>
        </div>

        <div class="result-box">
            <h4>Reshaped Input for LSTM:</h4>
            <pre>{{ reshaped_input }}</pre>
        </div>

        <div class="result-box">
            <h4>Training Accuracy Graph:</h4>
            <img src="{{ plot_path }}" class="img-fluid" alt="Training Accuracy">
        </div>

        <div class="text-center mt-4">
            <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>
</body>
</html>
